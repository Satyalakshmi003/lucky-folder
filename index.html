<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="background:#fff; padding:30px; border-radius:8px; width:300px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <h2 style="text-align:center; margin-bottom:20px;">Login</h2>

    <form action="#" method="post">
      <label for="username">Username</label><br>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter username"
        required
        style="width:100%; padding:10px; margin:8px 0 15px; box-sizing:border-box;"
      >

      <label for="password">Password</label><br>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password"
        required
        style="width:100%; padding:10px; margin:8px 0 20px; box-sizing:border-box;"
      >

      <button
        type="submit"
        style="width:100%; padding:10px; background:#007BFF; color:#fff; border:none; border-radius:4px; cursor:pointer;"
      >
        Login
      </button>
    </form>

    <p style="text-align:center; margin-top:15px; font-size:14px;">
      Don't have an account?
      <a href="#" style="color:#007BFF; text-decoration:none;">Sign Up</a>
    </p>
  </div>

</body>
</html>
